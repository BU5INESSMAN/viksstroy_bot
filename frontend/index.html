<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="theme-color" content="#1F253A" />
    <meta name="apple-mobile-web-app-title" content="ВиКС" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>ВиКС</title>
    <script>
      // Load the Telegram SDK ONLY inside a Telegram Mini App. telegram.org is
      // throttled/blocked by some RU ISPs, so browser/PWA users (who never need
      // the SDK) must never request it -- an unconditional load white-screens them.
      // The "inside Telegram" signal exists BEFORE the SDK loads: the native client
      // sets window.TelegramWebviewProxy, and web/desktop Telegram passes tgWebApp*
      // params in the URL hash or query string.
      (function () {
        try {
          var inTelegram = window.TelegramWebviewProxy || window.Telegram ||
            (location.hash + location.search).indexOf('tgWebApp') !== -1;
          if (!inTelegram) return;
          var s = document.createElement('script');
          s.src = 'https://telegram.org/js/telegram-web-app.js';
          s.async = true;
          // A blocked/failed load must be swallowed -- never an uncaught error,
          // never a hang. TMAAuth.jsx polls for window.Telegram.WebApp after this
          // and shows a friendly "open inside Telegram" message if it never appears.
          s.onerror = function () { /* telegram.org unreachable -- app stays usable */ };
          document.head.appendChild(s);
        } catch (e) { /* never let the loader break render */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
