services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python main.py

  bot_max:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python main_max.py

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    command: uvicorn web.api_main:app --host 0.0.0.0 --port 8000